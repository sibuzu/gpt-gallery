<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPT Gallery</title>
    <link rel="stylesheet" href="styles/gallery.css">
</head>
<body>
  <header>
    <div class="bar">
      <div>
        <div class="title-line">
          <h1>GPT Gallery</h1>
          <p class="meta"><span id="visibleCount">0</span>/<span id="totalCount">0</span> images</p>
        </div>
      </div>
      <select class="category-menu" id="categoryMenu" aria-label="圖片分類"></select>
      <input class="search" id="search" type="search" placeholder="搜尋檔名或類別">
    </div>
    <nav class="filters" id="filters" aria-label="圖片分類"></nav>
  </header>

  <main>
    <section class="grid" id="grid" aria-live="polite"></section>
    <p class="empty" id="empty">沒有符合條件的圖片</p>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="close" id="close" type="button" aria-label="關閉">×</button>
    <figure>
      <img id="preview" alt="">
      <figcaption id="previewCaption"></figcaption>
    </figure>
  </div>
  <script src="scripts/gallery-data.js?v=1784726925" defer></script>
  <script src="scripts/gallery.js?v=1784726925" defer></script>
</body>
</html>
